<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FocusGuard — 회원가입</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0f14;color:#e8eaf0;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#141720;border:1px solid #2a2f40;border-radius:14px;padding:40px 36px;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
.logo-dot{width:12px;height:12px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 8px #22c55e}50%{box-shadow:0 0 2px #22c55e}}
.logo-title{font-size:18px;font-weight:700}
.title{font-size:22px;font-weight:700;margin-bottom:6px;text-align:center}
.subtitle{font-size:13px;color:#5a5f72;text-align:center;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:#8b90a0;margin-bottom:6px;letter-spacing:.04em}
.field input{width:100%;background:#0d0f14;border:1px solid #2a2f40;border-radius:8px;padding:11px 14px;color:#e8eaf0;font-size:14px;outline:none;transition:border .2s}
.field input:focus{border-color:#60a5fa}
.field input::placeholder{color:#3a3f52}
.field .hint{font-size:11px;color:#5a5f72;margin-top:5px}
.btn{width:100%;padding:12px;border-radius:8px;border:none;background:#60a5fa;color:#0d0f14;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{background:#1c1010;border:1px solid #f87171;border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px;display:none}
.success{background:#0f2018;border:1px solid #22c55e;border-radius:8px;padding:10px 14px;font-size:13px;color:#22c55e;margin-bottom:16px;display:none}
.footer{text-align:center;margin-top:24px;font-size:13px;color:#5a5f72}
.footer a{color:#60a5fa;text-decoration:none}
.footer a:hover{text-decoration:underline}
.divider{border:none;border-top:1px solid #2a2f40;margin:24px 0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-title">FocusGuard</div>
  </div>
  <div class="title">회원가입</div>
  <div class="subtitle">집중도 모니터링 시작하기</div>
  <div class="err"     id="errMsg"></div>
  <div class="success" id="successMsg"></div>
  <div class="field">
    <label>아이디 (이메일)</label>
    <input type="email" id="email" placeholder="example@email.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>비밀번호</label>
    <input type="password" id="password" placeholder="6자 이상 입력" autocomplete="new-password"/>
    <div class="hint">영문, 숫자 조합 6자 이상</div>
  </div>
  <div class="field">
    <label>비밀번호 확인</label>
    <input type="password" id="passwordConfirm" placeholder="비밀번호 재입력" autocomplete="new-password"/>
  </div>
  <button class="btn" id="registerBtn" onclick="handleRegister()">회원가입</button>
  <hr class="divider"/>
  <div class="footer">이미 계정이 있으신가요? <a href="login.html">로그인</a></div>
</div>

<script>
// ★ Flask 서버 주소 — login.html 과 동일하게 맞춰야 함
const FLASK_URL = "http://127.0.0.1:5000";
const USE_MOCK  = FLASK_URL.includes("127.0.0.1");

function showErr(msg) {
  const el = document.getElementById("errMsg");
  el.textContent = msg; el.style.display = "block";
  document.getElementById("successMsg").style.display = "none";
}
function showSuccess(msg) {
  const el = document.getElementById("successMsg");
  el.textContent = msg; el.style.display = "block";
  document.getElementById("errMsg").style.display = "none";
}
function hideAll() {
  document.getElementById("errMsg").style.display = "none";
  document.getElementById("successMsg").style.display = "none";
}

async function handleRegister() {
  hideAll();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirm  = document.getElementById("passwordConfirm").value;
  const btn      = document.getElementById("registerBtn");

  if (!email || !password || !confirm) { showErr("모든 항목을 입력해주세요."); return; }
  if (password.length < 6)             { showErr("비밀번호는 6자 이상이어야 합니다."); return; }
  if (password !== confirm)            { showErr("비밀번호가 일치하지 않습니다."); return; }

  btn.disabled = true;
  btn.textContent = "가입 중...";

  try {
    if (USE_MOCK) {
      await new Promise(r => setTimeout(r, 800));
      showSuccess("✅ 회원가입 완료! (Mock) 로그인 페이지로 이동합니다.");
      setTimeout(() => location.href = "login.html", 1500);
    } else {
      // ★ Flask API 실제 회원가입
      const res  = await fetch(`${FLASK_URL}/api/auth/register`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) { showErr(data.error || "회원가입 실패"); return; }

      showSuccess("✅ 회원가입 완료! 로그인 페이지로 이동합니다.");
      setTimeout(() => location.href = "login.html", 1500);
    }
  } catch(e) {
    showErr("서버 연결 오류: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "회원가입";
  }
}

document.addEventListener("keydown", e => { if (e.key === "Enter") handleRegister(); });
</script>
</body>
</html>
